<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">From Data Processing to Decision Intelligence</title>
  <desc id="desc">Six connected stages: Record, Integrate, Interpret, Anticipate, Decide and Learn, supported by human judgment and accountability.</desc>
  <rect width="1200" height="675" fill="#fbfaf6"/>
  <text x="80" y="90" fill="#0a2c27" font-family="Georgia, serif" font-size="45">From Data Processing to Decision Intelligence</text>
  <text x="80" y="132" fill="#5c6864" font-family="Arial, sans-serif" font-size="20">The capability grows. Human judgment remains essential.</text>
  <line x1="130" y1="320" x2="1070" y2="320" stroke="#c8914d" stroke-width="4"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(130 320)">
      <circle r="62" fill="#0a4b3c"/>
      <text y="-6" fill="#fff" font-size="22" font-weight="700">Record</text>
      <text y="24" fill="#dbe8e3" font-size="14">What happened?</text>
    </g>
    <g transform="translate(318 320)">
      <circle r="62" fill="#0f6b55"/>
      <text y="-6" fill="#fff" font-size="22" font-weight="700">Integrate</text>
      <text y="24" fill="#e0eee9" font-size="14">How is it connected?</text>
    </g>
    <g transform="translate(506 320)">
      <circle r="62" fill="#19775f"/>
      <text y="-6" fill="#fff" font-size="22" font-weight="700">Interpret</text>
      <text y="24" fill="#e0eee9" font-size="14">What does it mean?</text>
    </g>
    <g transform="translate(694 320)">
      <circle r="62" fill="#27866e"/>
      <text y="-6" fill="#fff" font-size="20" font-weight="700">Anticipate</text>
      <text y="24" fill="#e0eee9" font-size="14">What may happen?</text>
    </g>
    <g transform="translate(882 320)">
      <circle r="62" fill="#a96d2e"/>
      <text y="-6" fill="#fff" font-size="22" font-weight="700">Decide</text>
      <text y="24" fill="#fff1df" font-size="14">What should we consider?</text>
    </g>
    <g transform="translate(1070 320)">
      <circle r="62" fill="#774a22"/>
      <text y="-6" fill="#fff" font-size="22" font-weight="700">Learn</text>
      <text y="24" fill="#fff1df" font-size="14">What changed?</text>
    </g>
  </g>
  <path d="M130 453 H1070" stroke="#0a4b3c" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="600" y="495" text-anchor="middle" fill="#0a4b3c" font-family="Arial, sans-serif" font-size="22" font-weight="700">Human judgment and accountability</text>
  <text x="80" y="610" fill="#5c6864" font-family="Arial, sans-serif" font-size="17">Veera Babu Tiragatla · Where technology meets human understanding</text>
</svg>
